---
# =============================================
# Namespace
# =============================================
apiVersion: v1
kind: Namespace
metadata:
  name: card-game
---
# =============================================
# Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-backend
  namespace: card-game
  labels:
    app: game-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: game-backend
  template:
    metadata:
      labels:
        app: game-backend
    spec:
      containers:
        - name: backend
          image: fortisuno/game-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
---
# =============================================
# Service
# =============================================
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: card-game
  labels:
    app: game-backend
spec:
  type: ClusterIP
  selector:
    app: game-backend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP