# =============================================
# Cloudflare Tunnel Setup
# =============================================
# This manifest deploys a Cloudflare Tunnel (cloudflared)
# to expose the game-backend service externally.
#
# Prerequisites:
#   1. Domain must be added to Cloudflare
#   2. Don Dominio nameservers must be changed to Cloudflare's nameservers
#   3. Tunnel must be created and credentials stored in K8s Secret
#   4. Fill in TUNNEL_UUID and TUNNEL_HOSTNAME in k8s.env
#
# Setup steps:
#   1. Run: ./scripts/setup-cloudflare-secret.sh
#   2. Create k8s.env from k8s.env.example with your values
#   3. Run: source k8s.env && kubectl apply -f <(envsubst < apps/backend/k8s/cloudflared.yaml)
# =============================================

---
# =============================================
# Namespace
# =============================================
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare
  labels:
    app: cloudflared
---
# =============================================
# ConfigMap — Ingress Rules
# =============================================
# NOTE: 0262ce99-be82-433b-8a03-229b6e67706f and api-partybooster-hpe.rehiletehvac.com are substituted by envsubst
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare
data:
  config.yaml: |
    tunnel: 0262ce99-be82-433b-8a03-229b6e67706f
    credentials-file: /etc/cloudflared/credentials.json

    ingress:
      - hostname: api-partybooster-hpe.rehiletehvac.com
        service: http://game-service.card-game.svc.cluster.local:80
      - service: http_status:404
---
# =============================================
# Deployment — cloudflared
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.5.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --config
            - /etc/cloudflared/config.yaml
            - run
            - 0262ce99-be82-433b-8a03-229b6e67706f
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: credentials
          secret:
            secretName: tunnel-credentials