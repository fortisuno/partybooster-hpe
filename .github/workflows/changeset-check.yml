name: Changeset Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changeset files
        id: changeset
        run: |
          HAS_CHANGESET=$(find .changeset -maxdepth 1 -name "*.md" -type f | wc -l)
          echo "count=$HAS_CHANGESET" >> $GITHUB_OUTPUT

      - name: Check for changeset label
        id: label
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels) }}'
          if echo "$LABELS" | jq -e 'any(.[] | .name == "changeset")' > /dev/null 2>&1; then
            echo "has_label=true" >> $GITHUB_OUTPUT
          else
            echo "has_label=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if no changeset
        if: steps.changeset.outputs.count == '0' && steps.label.outputs.has_label == 'false'
        run: |
          echo "❌ Esta PR no contiene archivos de changeset y no tiene la etiqueta 'changeset'."
          echo ""
          echo "Si esta PR incluye cambios que requieren versionado (features, fixes, etc.),"
          echo "debes crear un archivo de changeset ejecutando:"
          echo ""
          echo "  pnpm changeset"
          echo ""
          echo "Si esta PR solo incluye cambios menores (docs, CI/CD, refactors sin cambios de comportamiento),"
          echo "agrega la etiqueta 'changeset' a la PR."
          exit 1